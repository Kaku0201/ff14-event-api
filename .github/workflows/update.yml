name: Update Events

on:
  schedule:
    - cron: '0 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    # ✅ 봇에게 쓰기 권한을 명시적으로 부여합니다.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 최신 버전 사용
        with:
          ref: main # 메인 브랜치 명시

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fetch_events.py
        run: python scripts/fetch_events.py

      # ✅ [가장 중요] 전용 커밋 액션을 사용합니다. 
      # 이 액션은 알아서 pull을 받고 충돌을 해결한 뒤 안전하게 올립니다.
      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 자동 업데이트: 이벤트 목록 갱신"
          file_pattern: 'events/events.json'
          branch: main
