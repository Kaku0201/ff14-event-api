name: Update Events

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

    
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # ES Modules를 지원하는 최신 안정화 버전

     
      - name: Install dependencies
        run: npm install

     
      - name: Run update.js
        run: node update.js
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}

     
      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 자동 업데이트: 이벤트 목록 갱신 및 푸시 발송"
          file_pattern: 'events.json' 
          branch: main
