name: Update Events

on:
  schedule:
    # 유저님의 아이디어를 반영하여 매시 정각(0분)에 실행되도록 설정했습니다.
    # (GitHub Actions는 초 단위 설정을 지원하지 않아 '0분'이 최선입니다!)
    - cron: '0 * * * *' 
  workflow_dispatch: # 수동으로 실행하고 싶을 때 사용

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # rebase를 안전하게 하기 위해 전체 히스토리를 가져옵니다.
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fetch_events.py
        # 파일 위치가 scripts 폴더 안이 맞는지 꼭 확인해 주세요!
        run: python scripts/fetch_events.py

      - name: Commit & Push if changed
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          
          # 변경사항 확인 및 커밋
          git add events/events.json
          git commit -m "update events" || echo "No changes to commit"
          
          # ✅ [핵심 해결책] Push 하기 전, 서버의 최신 변경사항(유저님의 수동 수정)을 가져와 합칩니다.
          git pull --rebase origin main
          
          # 최종 Push
          git push origin main
